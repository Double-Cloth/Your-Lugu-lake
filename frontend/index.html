<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端视口优化 -->
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no"
    />
    
    <!-- 防止 iOS 地址栏拉下 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="泸沽湖导览" />
    
    <!-- Android Chrome 优化 -->
    <meta name="theme-color" content="#1295c9" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- 防止 iOS 自动修正 -->
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    
    <!-- 禁用缩放 -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="320" />
    
    <!-- 浏览器兼容性 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <title>泸沽湖智能导览</title>
    
    <!-- 防止体内滚动 -->
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
