services:
  db:
    image: postgres:14
    container_name: lugu-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lugu_lake}
      POSTGRES_USER: ${POSTGRES_USER:-lugu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lugu123}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lugu} -d ${POSTGRES_DB:-lugu_lake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lugu-backend
    env_file:
      - .env.example
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-lugu_lake}
      POSTGRES_USER: ${POSTGRES_USER:-lugu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lugu123}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./backend:/app
      - ./knowledge-base:/knowledge-base
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lugu-frontend
    env_file:
      - .env.example
    ports:
      - "${FRONTEND_BIND_HOST:-0.0.0.0}:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - ./knowledge-base:/knowledge-base
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  backend_uploads:
